name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: oplire.exe
            asset_name: oplire-windows-x86_64.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: oplire
            asset_name: oplire-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: oplire
            asset_name: oplire-macos-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare assets
        run: |
          mkdir -p release
          cp artifacts/oplire-windows-x86_64/oplire.exe release/oplire-windows-x86_64.exe
          cp artifacts/oplire-linux-x86_64/oplire release/oplire-linux-x86_64
          cp artifacts/oplire-macos-x86_64/oplire release/oplire-macos-x86_64
          chmod +x release/oplire-linux-x86_64 release/oplire-macos-x86_64
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/oplire-windows-x86_64.exe
            release/oplire-linux-x86_64
            release/oplire-macos-x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
